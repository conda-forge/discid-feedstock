{% set name = "discid" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/discid-{{ version }}.tar.gz
  sha256: 50fd3db445caeb44b9f7763777ed49688c3cf4633da99d340c25b919496ba8b5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=77.0.3
  run:
    - python >={{ python_min }}
    - libdiscid

test:
  imports:
    - discid
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://python-discid.readthedocs.org/
  dev_url: https://github.com/JonnyJD/python-discid
  summary: Python binding of Libdiscid
  license: LGPL-3.0-or-later AND GPL-3.0-or-later
  license_file:
    - COPYING.LESSER
    - COPYING

extra:
  recipe-maintainers:
    - HeavyTony2
